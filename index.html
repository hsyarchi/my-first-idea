<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="세상의 모든 위대한 시작을 위한, 내 첫번째 아이디어.">
    <title>내 첫번째 아이디어</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background dynamic glow shapes -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <main class="container">
        <div class="card" id="ideaCard">
            <div class="card-glow"></div>
            <header class="card-header">
                <span class="badge">PROLOGUE</span>
            </header>
            <section class="card-content">
                <h1 id="mainHeading" class="glow-text">내 첫번째 아이디어</h1>
                <p class="sub-text">화면을 클릭하여 영감의 불씨를 터뜨려보세요.</p>
            </section>
            <footer class="card-footer">
                <div class="interactive-indicator">
                    <span class="dot"></span>
                    <span class="indicator-text">Interactive Page</span>
                </div>
            </footer>
        </div>
    </main>

    <!-- Canvas for particle effect -->
    <canvas id="particleCanvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
